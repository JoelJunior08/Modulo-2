<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DOM</title>
    </head>
    <body>
        <h1>Estudos DOM</h1>
        <p>Aprendendo a usar DOM em javascript</p>
        <p>aqui que vai mudar</p>
        <p class="msg">Vamos usar outro <b>seletor</b></p>

        <label for="nome">Digite seu nome: </label>
        <input type="text" id="nome" name="nome">
        <button onclick="mostrarNome()">Mostrar</button>
        <p id="resultado"></p>

        <p id="texto">Vamos usar querrySelector</p>
        <p class="texto">Vamos usar querrySelector</p>

        <script>
            let paragrafo = document.getElementsByTagName('p')[1];
            paragrafo.innerText = 'texto alterado pelo javascript';
            paragrafo.style.color = 'blue';

            // let p2 = document.getElementById('msg');
            let p2 = document.getElementsByClassName('msg')[0 ];
            p2.innerHTML = 'Mudamos o texto usando o seletor <strong>CLASSE</strong>';

            function mostrarNome(){
                let nome = document.getElementsByName("nome")[0].value
                document.getElementById("resultado").innerText = `Olá, ${nome}`
            }

            let texto = document.querySelector("#texto")
            texto.innerText = "Usamos o querrySelector pelo ID"

            let text = document.querySelector(".texto")
            text.innerText = "Usamos o querrySelector pela CLASSE"

            let tex = document.querySelector("p")
            tex.innerText = "Usamos o querrySelector pela TAG"

            let nome = document.querySelector("[name='nome']")
            nome.innerText = 'Usamos o querrySelector pela NAME'
        </script>
    </body>
</html>
